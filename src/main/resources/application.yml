spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/hrms
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    issuer: hrms
    access-token-ttl: PT15M
    refresh-token-ttl: P30D
    secret: change-me-change-me-change-me-change-me-change-me-change-me
  bootstrap-admin:
    enabled: true
    username: superadmin
    password: SuperAdmin123
    email: superadmin@hrms.local
